<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaTeX → Excel数式 変換ツール</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 720px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 { font-size: 1.4rem; }
  textarea {
    width: 100%;
    box-sizing: border-box;
    font-family: "SFMono-Regular", Consolas, Menlo, monospace;
    font-size: 1rem;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 6px;
  }
  #latexInput { height: 80px; }
  #excelOutput { height: 50px; background: #f7f7f7; }
  .row { margin-top: 16px; }
  button {
    padding: 8px 16px;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  #copyBtn { background: #16a34a; }
  #copyBtn:hover { background: #15803d; }
  .hint { color: #666; font-size: 0.85rem; margin-top: 8px; }
  .example { color: #666; font-size: 0.85rem; }
  code { background: #eee; padding: 1px 4px; border-radius: 4px; }
  #preview {
    min-height: 48px;
    padding: 10px 14px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fafafa;
    font-size: 1.2rem;
    overflow-x: auto;
  }
  #preview.error { color: #dc2626; font-size: 0.9rem; font-family: monospace; }
  .preview-label { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
</style>
</head>
<body>
  <h1>LaTeX → Excel数式 変換ツール</h1>
  <p class="example">例: <code>\frac{a}{b}</code> → <code>=(a)/(b)</code></p>

  <div class="row">
    <label for="latexInput">LaTeX数式を入力</label>
    <textarea id="latexInput" placeholder="例: \frac{a}{b} + \sqrt{x^2 + y^2}"></textarea>
  </div>

  <div class="row">
    <div class="preview-label">プレビュー（数式の見た目）</div>
    <div id="preview"></div>
  </div>

  <div class="row">
    <button id="convertBtn">変換</button>
  </div>

  <div class="row">
    <label for="excelOutput">Excel数式（コピーして貼り付け可能）</label>
    <textarea id="excelOutput" readonly></textarea>
  </div>

  <div class="row">
    <button id="copyBtn">コピー</button>
    <span id="copyMsg" style="margin-left: 8px; color: #16a34a;"></span>
  </div>

  <p class="hint" style="margin-top: 24px;">
    不具合・ご要望は <a href="mailto:2412011.it@sist.ac.jp">2412011.it@sist.ac.jp</a> までご連絡ください。
  </p>

  <p class="hint">
    対応: \frac, \sqrt, \sqrt[n]{}, ^{}, _{}, \times, \cdot, \div, \pi,
    \sin \cos \tan \log \ln \exp, \left( \right), \ge \le \neq \pm など。<br>
    未対応のコマンドはそのままの名前で出力されます（手動修正してください）。
  </p>

<script>
// --- LaTeX -> Excel formula converter ---

function readGroup(s, i) {
  while (s[i] === ' ') i++;
  if (s[i] !== '{') return ['', i];
  let depth = 0;
  const start = i;
  for (let k = i; k < s.length; k++) {
    if (s[k] === '{') depth++;
    else if (s[k] === '}') {
      depth--;
      if (depth === 0) return [s.slice(start + 1, k), k + 1];
    }
  }
  return [s.slice(start + 1), s.length];
}

function readToken(s, i) {
  if (s[i] === '\\') {
    let j = i + 1;
    while (j < s.length && /[a-zA-Z]/.test(s[j])) j++;
    return [s.slice(i, j), j];
  }
  return [s[i] || '', i + 1];
}

const FUNC_NAMES = {
  sin: 'SIN', cos: 'COS', tan: 'TAN',
  sinh: 'SINH', cosh: 'COSH', tanh: 'TANH',
  log: 'LOG10', ln: 'LN', exp: 'EXP'
};

function convert(input) {
  let i = 0;
  let out = '';

  while (i < input.length) {
    const c = input[i];

    if (c === '\\') {
      let j = i + 1;
      while (j < input.length && /[a-zA-Z]/.test(input[j])) j++;
      const cmd = input.slice(i + 1, j);
      i = j;

      switch (cmd) {
        case 'frac': {
          const [g1, ni1] = readGroup(input, i);
          const [g2, ni2] = readGroup(input, ni1);
          out += '(' + convert(g1) + ')/(' + convert(g2) + ')';
          i = ni2;
          break;
        }
        case 'sqrt': {
          let n = null;
          let k = i;
          while (input[k] === ' ') k++;
          if (input[k] === '[') {
            const close = input.indexOf(']', k);
            n = input.slice(k + 1, close);
            k = close + 1;
          }
          const [g, ni] = readGroup(input, k);
          if (n) out += '(' + convert(g) + ')^(1/(' + convert(n) + '))';
          else out += 'SQRT(' + convert(g) + ')';
          i = ni;
          break;
        }
        case 'left':
        case 'right': {
          // skip the delimiter character that follows (e.g. ( ) | .)
          while (input[i] === ' ') i++;
          if (input[i] === '\\') { const [, ni] = readToken(input, i); i = ni; }
          else i++;
          break;
        }
        case 'times':
        case 'cdot':
          out += '*';
          break;
        case 'div':
          out += '/';
          break;
        case 'pi':
          out += 'PI()';
          break;
        case 'cdots':
        case 'ldots':
        case 'dots':
          out += '...';
          break;
        case 'pm':
          out += '±';
          break;
        case 'ge':
          out += '>=';
          break;
        case 'le':
          out += '<=';
          break;
        case 'neq':
          out += '<>';
          break;
        case 'sin': case 'cos': case 'tan':
        case 'sinh': case 'cosh': case 'tanh':
        case 'log': case 'ln': case 'exp': {
          const fname = FUNC_NAMES[cmd];
          let k = i;
          while (input[k] === ' ') k++;
          if (input[k] === '{') {
            const [g, ni] = readGroup(input, k);
            out += fname + '(' + convert(g) + ')';
            i = ni;
          } else {
            const [tok, ni] = readToken(input, k);
            out += fname + '(' + convert(tok) + ')';
            i = ni;
          }
          break;
        }
        default:
          // unknown command (e.g. greek letters): keep the name as-is
          out += cmd;
      }
    } else if (c === '^') {
      i++;
      if (input[i] === '{') {
        const [g, ni] = readGroup(input, i);
        out += '^(' + convert(g) + ')';
        i = ni;
      } else {
        out += '^' + (input[i] || '');
        i++;
      }
    } else if (c === '_') {
      i++;
      if (input[i] === '{') {
        const [g, ni] = readGroup(input, i);
        out += '_' + convert(g);
        i = ni;
      } else {
        out += '_' + (input[i] || '');
        i++;
      }
    } else if (c === '{') {
      const [g, ni] = readGroup(input, i);
      out += convert(g);
      i = ni;
    } else if (c === '}') {
      i++;
    } else if (c === '$') {
      i++;
    } else {
      out += c;
      i++;
    }
  }

  return out;
}

function latexToExcelFormula(latex) {
  const cleaned = latex.trim().replace(/^\$+|\$+$/g, '');
  return '=' + convert(cleaned);
}

const latexInput = document.getElementById('latexInput');
const excelOutput = document.getElementById('excelOutput');
const copyMsg = document.getElementById('copyMsg');

document.getElementById('convertBtn').addEventListener('click', () => {
  excelOutput.value = latexToExcelFormula(latexInput.value);
  copyMsg.textContent = '';
});

document.getElementById('copyBtn').addEventListener('click', async () => {
  if (!excelOutput.value) return;
  try {
    await navigator.clipboard.writeText(excelOutput.value);
    copyMsg.textContent = 'コピーしました';
  } catch (e) {
    excelOutput.select();
    document.execCommand('copy');
    copyMsg.textContent = 'コピーしました';
  }
  setTimeout(() => { copyMsg.textContent = ''; }, 2000);
});

latexInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    document.getElementById('convertBtn').click();
  }
});

// --- KaTeX preview ---
const preview = document.getElementById('preview');

function renderPreview() {
  const raw = latexInput.value.trim().replace(/^\$+|\$+$/g, '');
  if (!raw) { preview.textContent = ''; preview.className = ''; return; }
  if (typeof katex === 'undefined') return; // KaTeX not yet loaded
  try {
    katex.render(raw, preview, { displayMode: true, throwOnError: true });
    preview.className = '';
  } catch (e) {
    preview.className = 'error';
    preview.textContent = e.message;
  }
}

latexInput.addEventListener('input', renderPreview);

// KaTeX is deferred, render once it loads
document.addEventListener('DOMContentLoaded', renderPreview);
</script>
</body>
</html>
